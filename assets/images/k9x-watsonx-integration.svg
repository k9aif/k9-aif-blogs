  <rect x="550" y="682" width="180" height="90" rx="13" fill="white" stroke="#E0E8F8" stroke-width="1.5" filter="url(#cardshadow)"/>
  <rect x="550" y="682" width="6" height="90" rx="3" fill="#0530AD"/>
  <text x="573" y="710" fill="#0530AD" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">05</text>
  <text x="573" y="729" fill="#9AA8C0" font-family="Arial, Helvetica, sans-serif" font-size="11">watsonx</text>
  <text x="573" y="750" fill="#1A2040" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">.governance</text>

