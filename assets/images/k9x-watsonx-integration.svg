  <rect x="870" y="870" width="6" height="90" rx="3" fill="#0530AD"/>
  <text x="893" y="898" fill="#0530AD" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">04</text>
  <text x="893" y="917" fill="#9AA8C0" font-family="Arial, Helvetica, sans-serif" font-size="11">watsonx</text>
  <text x="893" y="938" fill="#1A2040" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">Orchestrate</text>

