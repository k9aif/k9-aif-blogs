  <rect x="1190" y="308" width="180" height="90" rx="13" fill="white" stroke="#E0E8F8" stroke-width="1.5" filter="url(#cardshadow)"/>
  <rect x="1190" y="308" width="6" height="90" rx="3" fill="#0530AD"/>
  <text x="1213" y="336" fill="#0530AD" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">02</text>
