<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340" font-family="'IBM Plex Sans', system-ui, sans-serif">

  <!-- Background -->
  <rect width="860" height="340" rx="12" fill="#0d1424"/>

  <!-- ── Step boxes ── -->

  <!-- 1: Write Spec -->
  <rect x="20" y="130" width="130" height="72" rx="8" fill="#111d35" stroke="#1c3050" stroke-width="1.5"/>
  <text x="85" y="158" text-anchor="middle" fill="#a8c0d8" font-size="11" font-weight="600">📄 Write</text>
  <text x="85" y="174" text-anchor="middle" fill="#a8c0d8" font-size="11" font-weight="600">Spec Doc</text>
  <text x="85" y="192" text-anchor="middle" fill="#6a8aaa" font-size="9">Design first</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="166" x2="178" y2="166" stroke="#1c3050" stroke-width="1.5"/>
  <polygon points="178,161 188,166 178,171" fill="#1c3050"/>

  <!-- 2: Clone -->
  <rect x="188" y="130" width="130" height="72" rx="8" fill="#111d35" stroke="#1c3050" stroke-width="1.5"/>
  <text x="253" y="158" text-anchor="middle" fill="#a8c0d8" font-size="11" font-weight="600">⬇ Clone</text>
  <text x="253" y="174" text-anchor="middle" fill="#a8c0d8" font-size="11" font-weight="600">Framework</text>
  <text x="253" y="192" text-anchor="middle" fill="#6a8aaa" font-size="9">github.com/k9aif</text>

  <!-- Arrow 2→3 -->
  <line x1="318" y1="166" x2="346" y2="166" stroke="#1c3050" stroke-width="1.5"/>
  <polygon points="346,161 356,166 346,171" fill="#1c3050"/>

  <!-- 3: VS Code + Claude Code -->
  <rect x="356" y="116" width="148" height="100" rx="8" fill="#162040" stroke="#0f62fe" stroke-width="1.5"/>
  <text x="430" y="144" text-anchor="middle" fill="#4589ff" font-size="11" font-weight="700">VS Code</text>
  <text x="430" y="160" text-anchor="middle" fill="#4589ff" font-size="11" font-weight="700">+ Claude Code</text>
  <rect x="372" y="170" width="112" height="32" rx="4" fill="#0d1424" stroke="#1c3050" stroke-width="1"/>
  <text x="428" y="183" text-anchor="middle" fill="#6a8aaa" font-size="9">Run the prompt →</text>
  <text x="428" y="196" text-anchor="middle" fill="#00b4d8" font-size="9" font-weight="600">paste &amp; execute</text>

  <!-- Arrow 3→4 -->
  <line x1="504" y1="166" x2="532" y2="166" stroke="#0f62fe" stroke-width="1.5"/>
  <polygon points="532,161 542,166 532,171" fill="#0f62fe"/>

  <!-- 4: Claude reads — centre box -->
  <rect x="542" y="40" width="148" height="252" rx="8" fill="#111d35" stroke="#1c3050" stroke-width="1.5"/>
  <text x="616" y="66" text-anchor="middle" fill="#6a8aaa" font-size="9" font-weight="600" letter-spacing="0.8">CLAUDE READS</text>

  <!-- sub-items -->
  <rect x="558" y="76" width="116" height="28" rx="4" fill="#162040" stroke="#1c3050" stroke-width="1"/>
  <text x="616" y="87" text-anchor="middle" fill="#a8c0d8" font-size="9">Base Classes</text>
  <text x="616" y="99" text-anchor="middle" fill="#6a8aaa" font-size="8">BaseAgent · BaseSquad · …</text>

  <rect x="558" y="114" width="116" height="28" rx="4" fill="#162040" stroke="#1c3050" stroke-width="1"/>
  <text x="616" y="125" text-anchor="middle" fill="#a8c0d8" font-size="9">Reference Example</text>
  <text x="616" y="137" text-anchor="middle" fill="#6a8aaa" font-size="8">EOC canonical app</text>

  <rect x="558" y="152" width="116" height="28" rx="4" fill="#162040" stroke="#1c3050" stroke-width="1"/>
  <text x="616" y="163" text-anchor="middle" fill="#a8c0d8" font-size="9">Your Spec Doc</text>
  <text x="616" y="175" text-anchor="middle" fill="#6a8aaa" font-size="8">domain · agents · flows</text>

  <line x1="616" y1="180" x2="616" y2="198" stroke="#1c3050" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="616" y="214" text-anchor="middle" fill="#00b4d8" font-size="9" font-weight="600">Context =</text>
  <text x="616" y="228" text-anchor="middle" fill="#00b4d8" font-size="9" font-weight="600">Domain + Contract</text>

  <rect x="558" y="240" width="116" height="40" rx="4" fill="rgba(15,98,254,0.1)" stroke="#0f62fe" stroke-width="1"/>
  <text x="616" y="256" text-anchor="middle" fill="#4589ff" font-size="8" font-weight="700">Architecturally</text>
  <text x="616" y="268" text-anchor="middle" fill="#4589ff" font-size="8" font-weight="700">consistent output</text>
  <text x="616" y="279" text-anchor="middle" fill="#6a8aaa" font-size="7">not just syntactically correct</text>

  <!-- Arrow 4→5 -->
  <line x1="690" y1="166" x2="718" y2="166" stroke="#24a148" stroke-width="1.5"/>
  <polygon points="718,161 728,166 718,171" fill="#24a148"/>

  <!-- 5: Generated App -->
  <rect x="728" y="80" width="112" height="172" rx="8" fill="#111d35" stroke="#24a148" stroke-width="1.5"/>
  <text x="784" y="106" text-anchor="middle" fill="#42be65" font-size="10" font-weight="700">✓ Generated</text>

  <text x="748" y="128" fill="#6a8aaa" font-size="9">→ Agents</text>
  <text x="748" y="146" fill="#6a8aaa" font-size="9">→ Squads</text>
  <text x="748" y="164" fill="#6a8aaa" font-size="9">→ Router</text>
  <text x="748" y="182" fill="#6a8aaa" font-size="9">→ Config</text>
  <text x="748" y="200" fill="#6a8aaa" font-size="9">→ Tests</text>
  <text x="748" y="218" fill="#6a8aaa" font-size="9">→ Web UI</text>
  <text x="748" y="236" fill="#6a8aaa" font-size="9">→ Deploy</text>

  <!-- Step numbers -->
  <circle cx="85"  cy="118" r="10" fill="#0f62fe"/>
  <text x="85"  y="122" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
  <circle cx="253" cy="118" r="10" fill="#0f62fe"/>
  <text x="253" y="122" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>
  <circle cx="430" cy="104" r="10" fill="#0f62fe"/>
  <text x="430" y="108" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>
  <circle cx="616" cy="28"  r="10" fill="#0f62fe"/>
  <text x="616" y="32"  text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>
  <circle cx="784" cy="68"  r="10" fill="#24a148"/>
  <text x="784" y="72"  text-anchor="middle" fill="#fff" font-size="10" font-weight="700">✓</text>

</svg>
