---
layout: default
---

<section class="post-index">
  <h2>Posts</h2>
  <ul class="compact-post-list">
    {% for post in site.posts %}
      <li>
        <div class="post-date">{{ post.date | date: "%b %-d, %Y" }}</div>
        <a class="post-title-link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
</section>
